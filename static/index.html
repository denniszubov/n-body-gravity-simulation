<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-Body Gravity Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <canvas id="sim-canvas"></canvas>

  <div class="noise-overlay"></div>

  <aside id="panel" class="panel">
    <header class="panel-header">
      <div class="panel-title-group">
        <h1 class="panel-title">N-Body</h1>
        <span class="panel-subtitle">Gravitational Simulation</span>
      </div>
      <div class="panel-indicator" id="status-indicator">
        <span class="indicator-dot"></span>
        <span class="indicator-label">IDLE</span>
      </div>
    </header>

    <section class="panel-section">
      <label class="field-label">Scenario</label>
      <div class="select-wrapper">
        <select id="preset-select"></select>
        <svg class="select-chevron" viewBox="0 0 12 8" fill="none">
          <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div id="n-bodies-group" class="field-group" style="display:none">
        <label class="field-label">Bodies</label>
        <input type="number" id="n-bodies" class="field-input" value="200" min="10" max="2000" step="10">
      </div>

      <div class="field-group">
        <label class="field-label">Seed</label>
        <input type="number" id="seed" class="field-input" value="42" min="0" step="1">
      </div>
    </section>

    <section class="panel-section">
      <label class="field-label">Physics</label>
      <div class="field-row">
        <div class="field-group field-half">
          <label class="field-label-sm">dt</label>
          <input type="number" id="dt" class="field-input" value="0.005" min="0.0001" max="0.1" step="0.001">
        </div>
        <div class="field-group field-half">
          <label class="field-label-sm">Steps / frame</label>
          <input type="number" id="steps-per-frame" class="field-input" value="6" min="1" max="50" step="1">
        </div>
      </div>
    </section>

    <section class="panel-section panel-controls">
      <button id="btn-start" class="btn btn-primary">
        <svg viewBox="0 0 16 16" fill="currentColor"><polygon points="3,1 13,8 3,15"/></svg>
        Start
      </button>
      <button id="btn-pause" class="btn btn-secondary" disabled>
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="1" width="4" height="14"/><rect x="10" y="1" width="4" height="14"/></svg>
        Pause
      </button>
      <button id="btn-reset" class="btn btn-ghost">Reset</button>
    </section>

    <section class="panel-section panel-stats">
      <div class="stat-grid">
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="stat-time">0.0000</span>
        </div>
        <div class="stat">
          <span class="stat-label">Bodies</span>
          <span class="stat-value" id="stat-bodies">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Steps/s</span>
          <span class="stat-value" id="stat-sps">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Step time</span>
          <span class="stat-value" id="stat-step-time">—</span>
        </div>
      </div>
    </section>

    <section class="panel-section panel-energy">
      <details class="energy-details">
        <summary class="energy-summary">
          <span>Energy</span>
          <span class="energy-drift" id="energy-drift">Δ 0.00e+0</span>
        </summary>
        <div class="energy-body">
          <div class="stat">
            <span class="stat-label">Kinetic</span>
            <span class="stat-value" id="stat-ke">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Potential</span>
            <span class="stat-value" id="stat-pe">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Total</span>
            <span class="stat-value" id="stat-total-e">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Initial</span>
            <span class="stat-value" id="stat-initial-e">—</span>
          </div>
        </div>
      </details>
    </section>
  </aside>

  <script src="/static/app.js"></script>
</body>
</html>
